name: qiaomu-cut
version: 0.3.0
mode: governed
summary: 一句话生成专业视频的乔木智能剪辑导演
owner:
  name: 向阳乔木
  x: https://x.com/vista8
  github: https://github.com/joeseesun/

intents:
  - id: create_video
    description: 从自然语言 brief 规划、采集、生成、剪辑和验证视频
    examples:
      - 给我做一个 60 秒挖掘机英语启蒙视频
      - 搜几段电影里骂人的台词，混剪成英语学习视频
      - 介绍乔布斯，做一个电影感人物短片
      - 把这段口播剪成小红书风格短视频
  - id: source_media
    description: 搜索或整理视频、照片、插画、影视台词、本地文件和 AI 生成素材
  - id: plan_video
    description: 生成 QiaoCut IR、分镜、镜头语言、转场和渲染计划
  - id: verify_video
    description: 检查输出视频编码、时长、分辨率、音频和来源记录

inputs:
  brief:
    type: string
    required: true
    description: 用户的一句话视频需求
  workflow:
    type: enum
    required: false
    values:
      - english-mix
      - stock-story
      - person-profile
      - explainer
      - cinematic-short
      - product-launch
      - social-short
      - talking-head
      - data-story
      - hybrid-studio
  assets:
    type: array
    required: false
    description: 本地文件、URL、素材候选或已下载素材
  output:
    type: object
    required: false
    properties:
      aspect: "9:16 | 16:9 | 1:1 | 21:9"
      durationSeconds: number
      platform: "douyin | xiaohongshu | tiktok | youtube | course | custom"
      profile: "preview | standard | final"

outputs:
  - qiaocut-ir.json
  - assets-manifest.json
  - license-report.md
  - quality-report.json
  - final.preview.mp4
  - final.standard.mp4
  - final.mp4

commands:
  doctor:
    run: node scripts/qcut.js doctor --json
    description: 检查 ffmpeg-full、33tc、ClipSeek、本地工具能力
  clipseek:
    run: node scripts/qcut.js clipseek "挖掘机" --type video --json
    description: 搜索 ClipSeek 免费素材候选
  plan:
    run: node scripts/qcut.js plan "做一个挖掘机英语启蒙视频" --json
    description: 生成 QiaoCut IR 草案
  verify:
    run: node scripts/qcut.js verify /path/to/video.mp4 --json
    description: 验证外部生成、移动后或单独收到的视频；qcut render 已内置对应档位校验，不重复执行
  render_preview:
    run: node scripts/qcut.js render /path/to/project --profile preview --json
    description: Skill 默认第一步；960 长边/24 fps 上限、basic 校验、单遍响度、无 contact sheet
  render_standard:
    run: node scripts/qcut.js render /path/to/project --profile standard --json
    description: 日常交付；1280 长边/30 fps 上限、响度/峰值/静音校验和最多 8 帧 contact sheet
  render_final:
    run: node scripts/qcut.js render /path/to/project --profile final --json
    description: 正式终稿；timeline 原始输出、两遍响度、full 校验和 contact sheet；省略 profile 仍默认 final
  33tc:
    run: node scripts/qcut.js 33tc search "台词" --json
    description: 委托独立安装且获授权的 33tc CLI；pick/cut 可能耗积分，必须显式确认
  scaffold:
    run: node scripts/qcut.js scaffold ./qiaocut-project --brief "做一个 60 秒挖掘机英语启蒙视频" --json
    description: 创建视频项目目录、IR、素材 manifest 和授权报告
  ass:
    run: node scripts/qcut.js ass captions.json --output subtitles.ass
    description: 把 caption JSON 转成 ASS 字幕
  html_scene:
    run: node scripts/qcut.js html-scene qiaocut-ir.json --scene s01 --output scenes/s01.html
    description: 把 IR scene 转成可捕获的 HTML 视觉场景
  license:
    run: node scripts/qcut.js license assets-manifest.json --output license-report.md
    description: 生成素材授权报告
  bootstrap_macos:
    run: scripts/bootstrap_macos.sh --check
    description: 检查或安装 ffmpeg-full

trust_boundary:
  reads:
    - local media files explicitly provided by the user
    - local 33TaiCi login state through an independently installed 33tc adapter; token values must not be printed
    - public ClipSeek/Pexels/Pixabay-style source pages
  writes:
    - project output directory chosen by user or agent
    - generated reports and manifests
  network:
    - public media discovery and cited information sources
    - 33TaiCi service calls made by the external adapter when the user invokes qcut 33tc
  avoids:
    - deleting original media
    - printing secrets, cookies, tokens, or private account data
    - claiming provider license without source-page evidence
    - redistributing 33TaiCi private protocols as part of this public skill
    - bundling, uploading, or redistributing fonts discovered on the user's machine

performance_workflow:
  default_cli_profile: final
  skill_sequence:
    - render preview for content, caption, pacing, and composition iteration
    - render standard only for internal or speed-sensitive delivery
    - render final once content is locked and release evidence is required
  cache:
    path: .qiaocut/cache
    enabled_by_default: true
    reusable_artifacts:
      - shot segments
      - macOS narration cues
      - captioned picture master
      - private local caption-font copy
    bypass: --no-cache
  validation:
    preview: basic stream, duration, dimensions, frame-rate, pixel-format, and non-empty-file checks
    standard: preview checks plus final loudness, true peak, and silence boundaries
    final: standard checks plus full black-frame scan
    release_ready: only final + full + verification pass + verified caption font when captions exist
  font_policy: Prefer project fontsDir; otherwise reuse an installed local Noto Sans CJK SC only inside the private project cache and never distribute it.
  measured_baseline:
    fixture: 60-second DIG bilingual demo on the development Mac
    legacy_final_seconds: 71.6
    preview_cold_seconds: 27.7
    preview_warm_seconds: 3.3-4.1
    standard_cold_seconds_tts_warm: 27.1
    standard_warm_seconds: 4.1
    final_cold_seconds_tts_warm: 65.6
    final_warm_seconds: 8.5
  no_duplicate_verify: Do not invoke qcut verify immediately after a successful qcut render of the same file.

release_gate:
  required:
    - validate_skill.py
    - trigger_eval.py
    - qcut doctor
    - README review
    - secret scan before GitHub publish
    - final profile with full validation and releaseReady true for release video fixtures
  missing_evidence:
    - end-to-end render fixtures for every workflow
    - provider-backed download adapters beyond ClipSeek discovery
    - human-reviewed public release
    - an official public 33TaiCi API or redistribution permission for a bundled zero-install adapter
